services:
  postgres:
    image: postgres:17
    container_name: exposureguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: exposureguard
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d exposureguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: exposureguard-backend
    restart: unless-stopped
    working_dir: /workspace/backend
    command: mvn spring-boot:run
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/exposureguard
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/workspace/backend
      - maven_cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    container_name: exposureguard-frontend
    restart: unless-stopped
    working_dir: /workspace/frontend
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/workspace/frontend
      - frontend_node_modules:/workspace/frontend/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  maven_cache:
  frontend_node_modules:
