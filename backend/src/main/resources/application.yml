spring:
  application:
    name: backend

  datasource:
    url: jdbc:mysql://localhost:3306/exposureguard
    username: app
    password: app

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
