services:
  postgres:
    image: postgres:17
    container_name: exposureguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: exposureguard
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
